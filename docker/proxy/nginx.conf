events {
    worker_connections 1024;
}

http {

    log_format upstreamlog '$remote_addr - $host [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$upstream_addr"';
    access_log /var/log/nginx/access.log upstreamlog;

    upstream edge_servers {
        server backend-1:3000 max_fails=3 fail_timeout=3s;
        server backend-2:3000 max_fails=3 fail_timeout=3s;
        server backend-3:3000 max_fails=3 fail_timeout=3s;
        keepalive 256;
    }

    server {
        listen 80;

        server_name localhost;

        location = /health {
            return 200 "ok";
        }

        location /api/ {
            proxy_pass http://edge_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 1m;
            keepalive_timeout 65;
            keepalive_requests 1000;
            proxy_http_version 1.1;
        }
    }

}